{% load static %}
<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <title>Forgot Password | Syntax Academy</title>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="{% static 'css/skeleton.css' %}">
      <style>
         body{
         font-family:'Poppins',sans-serif;
         min-height:100vh;
         background:radial-gradient(rgba(148,163,184,0.08) 1px,transparent 1px);
         background-size:20px 20px;
         background-color:#020617;
         display:flex;
         align-items:center;
         justify-content:center;
         color:#e5e7eb;
         }
         .login-card{
         width:420px;
         background:linear-gradient(180deg,rgba(15,23,42,0.96),rgba(2,6,23,0.96));
         border-radius:18px;
         padding:38px;
         border:1px solid rgba(108,242,194,0.18);
         box-shadow:0 20px 40px rgba(0,0,0,0.45);
         }
         .login-title{
         text-align:center;
         font-weight:600;
         font-size:22px;
         margin-bottom:30px;
         background:linear-gradient(90deg,#6cf2c2,#6aa8ff);
         -webkit-background-clip:text;
         -webkit-text-fill-color:transparent;
         }
         .input-group{
         border-bottom:1px solid rgba(255,255,255,0.15);
         margin-bottom:22px;
         }
         .input-group-text{
         background:transparent;
         border:none;
         color:#6cf2c2;
         }
         .form-control{
         background:transparent;
         border:none;
         color:white;
         }
         .login-btn{
         width:100%;
         margin-top:14px;
         background:linear-gradient(90deg,#6cf2c2,#6aa8ff);
         border:none;
         border-radius:50px;
         padding:12px;
         font-weight:600;
         color:#0b0f1a;
         }
         .error{
         color:#ff6b6b;
         font-size:13px;
         text-align:center;
         margin-top:10px;
         }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active{
            -webkit-background-clip: text;
            -webkit-text-fill-color: #ffffff !important;
            transition: background-color 9999s ease-in-out 0s;
            box-shadow: 0 0 0px 1000px transparent inset !important;
        }

        /* Keep placeholder visible like login page */
        .form-control::placeholder{
            color:#64748b;
            opacity:1;
        }

        /* Prevent white focus box */
        .form-control:focus{
            background: transparent !important;
            box-shadow:none !important;
        }

        .form-control{
            color:#ffffff !important;
            -webkit-text-fill-color:#ffffff !important;
        }

        /* ===== PLACEHOLDER (DIM LIKE LOGIN) ===== */
        .form-control::placeholder{
            color:#64748b !important;
            -webkit-text-fill-color:#64748b !important;
            opacity:1;
        }

        /* ===== WHEN USER STARTS TYPING ===== */
        .form-control:focus{
            color:#ffffff !important;
            -webkit-text-fill-color:#ffffff !important;
        }

        /* ===== CHROME AUTOFILL TEXT FIX ===== */
        input:-webkit-autofill{
            -webkit-text-fill-color:#ffffff !important;
            caret-color:#ffffff;
        }




      </style>
   </head>
   <body>
      <div class="standalone-skeleton-loader" role="status" aria-live="polite" aria-label="Loading forgot password form">
         <div class="sk-auth-shell">
            <div class="sk-card sk-auth-card">
               <div class="sk-line sk-title"></div>
               <div class="sk-field"></div>
               <div class="sk-button" style="width:100%;"></div>
            </div>
         </div>
      </div>

      <div class="login-card">
         <h4 class="login-title">Forgot Password</h4>
         <form method="post">
            {% csrf_token %}
            <div class="input-group">
               <span class="input-group-text"><i class="bi bi-envelope"></i></span>
               <input type="email" name="email" class="form-control" placeholder="Enter registered email" required>
            </div>
            <button type="submit" class="btn login-btn">Send OTP</button>
            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
         </form>
      </div>
      <script>
         window.setTimeout(function () {
            document.documentElement.classList.add('page-skeleton-ready');
         }, 500);

         document.addEventListener('DOMContentLoaded', function () {
            const emailFields = document.querySelectorAll('input[type="email"]');
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

            const validateEmailValue = function (field) {
               field.value = field.value.replace(/\s+/g, '');

               if (!field.value) {
                  field.setCustomValidity('');
                  return;
               }

               field.setCustomValidity(
                  emailPattern.test(field.value) ? '' : 'Enter a valid email address.'
               );
            };

            emailFields.forEach(function (field) {
               field.addEventListener('input', function () {
                  validateEmailValue(field);
               });

               field.addEventListener('blur', function () {
                  validateEmailValue(field);
               });

               validateEmailValue(field);
            });
         });
      </script>
      <script src="{% static 'js/language-switcher.js' %}"></script>
   </body>
</html>
