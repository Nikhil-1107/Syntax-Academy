{% extends "base.html" %}

{% block title %}Register | Syntax Academy{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<style>
.auth-page{
    min-height:calc(100vh - 72px);
    background:
        radial-gradient(rgba(148,163,184,0.08) 1px, transparent 1px);
    background-size:20px 20px;
    background-color:#020617;
    color:#e5e7eb;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
}

.register-card{
    width:420px;
    max-width:100%;
    background:linear-gradient(
        180deg,
        rgba(15,23,42,0.96),
        rgba(2,6,23,0.96)
    );
    border-radius:18px;
    padding:38px;
    border:1px solid rgba(108,242,194,0.18);
    box-shadow:0 20px 40px rgba(0,0,0,0.45);
}

.register-title{
    text-align:center;
    font-weight:600;
    font-size:22px;
    margin-bottom:30px;
    background:linear-gradient(90deg, #6cf2c2, #6aa8ff);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
}

.auth-field{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:0 0 12px;
    margin-bottom:22px;
    border-bottom:1px solid rgba(255,255,255,0.15);
}

.auth-icon{
    flex:0 0 22px;
    color:#49a4ff;
    font-size:18px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

.auth-input,
.auth-select{
    width:100%;
    min-width:0;
    background:transparent;
    border:none;
    outline:none;
    box-shadow:none;
    color:#ffffff;
    padding:0;
    font-size:14px;
    appearance:none;
    line-height:1.4;
}

.auth-input::placeholder{
    color:#64748b;
}

.auth-input:focus,
.auth-select:focus{
    outline:none;
    box-shadow:none;
}

.password-toggle{
    position:absolute;
    right:6px;
    top:50%;
    transform:translateY(-50%);
    color:#49a4ff;
    font-size:18px;
    cursor:pointer;
    display:none;
    z-index:5;
    transition:0.25s ease;
    width:20px;
    height:20px;
    align-items:center;
    justify-content:center;
}

.password-visible .password-toggle{
    display:flex;
}

.auth-field.password-field{
    padding-right:40px;
}

.auth-input[type="password"]::-ms-reveal,
.auth-input[type="password"]::-ms-clear{
    display:none;
}

.auth-input[type="password"]::-webkit-credentials-auto-fill-button{
    visibility:hidden;
    display:none !important;
    pointer-events:none;
    position:absolute;
    right:0;
}

.select-wrapper{
    position:relative;
    width:100%;
}

.select-wrapper::after{
    content:"\25BE";
    position:absolute;
    right:0;
    top:50%;
    transform:translateY(-50%);
    color:#6cf2c2;
    font-size:14px;
    pointer-events:none;
}

select option{
    background:#020617;
    color:#e5e7eb;
    padding:14px;
}

.register-btn{
    width:100%;
    margin-top:14px;
    background:linear-gradient(90deg, #6cf2c2, #6aa8ff);
    border:none;
    border-radius:50px;
    padding:12px;
    font-weight:600;
    font-size:15px;
    color:#0b0f1a;
    transition:all 0.35s ease;
    box-shadow:0 4px 12px rgba(108, 242, 194, 0.25);
}

.register-btn:hover{
    transform:translateY(-1px);
    box-shadow:
        0 6px 18px rgba(108, 242, 194, 0.35),
        0 0 0 1px rgba(108, 242, 194, 0.25);
}

.register-btn:active{
    transform:translateY(0);
    box-shadow:0 3px 10px rgba(108, 242, 194, 0.25);
}

.register-links{
    margin-top:24px;
    text-align:center;
    font-size:13px;
}

.register-links a{
    color:#6cf2c2;
    text-decoration:none;
    transition:0.25s ease;
}

.register-links a:hover{
    color:#6aa8ff;
}
</style>

{% if saved %}
<script>
    alert("{{ saved }}");
</script>
{% endif %}

{% if error %}
<script>
    alert("{{ error }}");
</script>
{% endif %}

<div class="auth-page">
    <div class="register-card">
        <h4 class="register-title">Create Account</h4>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'' }}">

            <div class="auth-field">
                <span class="auth-icon"><i class="bi bi-person"></i></span>
                <input type="text" name="name" class="auth-input" placeholder="Full Name" required>
            </div>

            <div class="auth-field">
                <span class="auth-icon"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="auth-input" placeholder="Email Address" required>
            </div>

            <div class="auth-field">
                <span class="auth-icon"><i class="bi bi-telephone"></i></span>
                <input type="tel" name="mobile" class="auth-input" placeholder="Mobile Number" inputmode="numeric" pattern="[0-9]*" maxlength="10" data-numeric-only required>
            </div>

            <div class="auth-field password-field" id="password-group">
                <span class="auth-icon"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" name="password" class="auth-input" placeholder="Password" minlength="8" required oninput="handlePasswordInput()">
                <i class="bi bi-eye password-toggle" onclick="togglePassword()"></i>
            </div>

            <div class="auth-field">
                <span class="auth-icon"><i class="bi bi-bar-chart"></i></span>
                <div class="select-wrapper">
                    <select name="level" class="auth-select" required>
                        <option value="" disabled selected>Experience Level</option>
                        <option>Beginner - New to coding</option>
                        <option>Intermediate - Some experience</option>
                        <option>Advanced - Confident coder</option>
                        <option>Pro Developer - Expert level</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn register-btn w-100">
                Create Account
            </button>
        </form>

        <div class="register-links">
            <a href="{% url 'login' %}{% if next %}?next={{ next|urlencode }}{% endif %}">Already have an account? Login</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const numericFields = document.querySelectorAll('input[data-numeric-only], textarea[data-numeric-only]');
        const passwordField = document.getElementById('password');
        const passwordRule = /^(?=.*[^A-Za-z0-9]).{8,}$/;

        const sanitizeNumericValue = function (field) {
            const digitsOnly = field.value.replace(/\D+/g, '');
            const maxLength = field.maxLength > 0 ? field.maxLength : null;
            field.value = maxLength ? digitsOnly.slice(0, maxLength) : digitsOnly;
        };

        const validatePasswordValue = function (field) {
            if (!field) {
                return;
            }

            if (!field.value) {
                field.setCustomValidity('');
                return;
            }

            field.setCustomValidity(
                passwordRule.test(field.value)
                    ? ''
                    : 'Password must be at least 8 characters and include a special character.'
            );
        };

        numericFields.forEach(function (field) {
            field.addEventListener('input', function () {
                sanitizeNumericValue(field);
            });

            field.addEventListener('keydown', function (event) {
                const allowedKeys = [
                    'Backspace', 'Delete', 'Tab', 'Enter', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'
                ];

                if (allowedKeys.includes(event.key) || event.ctrlKey || event.metaKey) {
                    return;
                }

                if (event.key.length === 1 && !/\d/.test(event.key)) {
                    event.preventDefault();
                }
            });

            sanitizeNumericValue(field);
        });

        if (passwordField) {
            passwordField.addEventListener('input', function () {
                validatePasswordValue(passwordField);
            });

            passwordField.addEventListener('blur', function () {
                validatePasswordValue(passwordField);
            });

            validatePasswordValue(passwordField);
        }
    });

    function handlePasswordInput() {
        const group = document.getElementById("password-group");
        const password = document.getElementById("password");

        if (password.value.length > 0) {
            group.classList.add("password-visible");
        } else {
            group.classList.remove("password-visible");
        }
    }

    function togglePassword() {
        const password = document.getElementById("password");
        const icon = document.querySelector(".password-toggle");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.replace("bi-eye", "bi-eye-slash");
        } else {
            password.type = "password";
            icon.classList.replace("bi-eye-slash", "bi-eye");
        }
    }
</script>
{% endblock %}
