{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Out</title>
    <meta http-equiv="refresh" content="0;url={{ redirect_url }}">
    <link rel="stylesheet" href="{% static 'css/skeleton.css' %}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #020617;
            color: #e5e7eb;
            font-family: Arial, sans-serif;
        }

        .logout-shell {
            text-align: center;
            padding: 32px;
        }
    </style>
</head>
<body>
    <div class="standalone-skeleton-loader" role="status" aria-live="polite" aria-label="Signing out">
        <div class="sk-auth-shell">
            <div class="sk-card sk-auth-card">
                <div class="sk-line sk-title"></div>
                <div class="sk-line sk-copy short" style="margin:0 auto;"></div>
            </div>
        </div>
    </div>

    <div class="logout-shell">
        <h1>Signing you out...</h1>
        <p>Redirecting you now.</p>
    </div>

    <script>
        (function () {
            window.setTimeout(function () {
                document.documentElement.classList.add('page-skeleton-ready');
            }, 500);

            const redirectUrl = "{{ redirect_url|escapejs }}";

            try {
                window.localStorage.clear();
            } catch (error) {}

            try {
                window.sessionStorage.clear();
            } catch (error) {}

            document.cookie.split(";").forEach(function (cookie) {
                const cookieName = cookie.split("=")[0].trim();

                if (!cookieName) {
                    return;
                }

                document.cookie = `${cookieName}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
            });

            if (window.history && window.history.replaceState) {
                window.history.replaceState(null, "", redirectUrl);
            }

            window.location.replace(redirectUrl);
        })();
    </script>
</body>
</html>
