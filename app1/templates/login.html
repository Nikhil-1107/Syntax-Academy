{% extends "base.html" %}

{% block title %}Login | Syntax Academy{% endblock %}

{% block footer %}{% endblock %}

{% block content %}
<style>
.auth-page{
    min-height:calc(100vh - 72px);
    background:
        radial-gradient(rgba(148,163,184,0.08) 1px, transparent 1px);
    background-size:20px 20px;
    background-color:#020617;
    color:#e5e7eb;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
}

.login-card{
    width:420px;
    max-width:100%;
    background:linear-gradient(
        180deg,
        rgba(15,23,42,0.96),
        rgba(2,6,23,0.96)
    );
    border-radius:18px;
    padding:38px;
    border:1px solid rgba(108,242,194,0.18);
    box-shadow:0 20px 40px rgba(0,0,0,0.45);
}

.login-title{
    text-align:center;
    font-weight:600;
    font-size:22px;
    margin-bottom:30px;
    background:linear-gradient(90deg, #6cf2c2, #6aa8ff);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
}

.auth-field{
    position:relative;
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    padding:0 0 12px;
    margin-bottom:22px;
    border-bottom:1px solid rgba(255,255,255,0.15);
}

.auth-icon{
    flex:0 0 22px;
    color:#49a4ff;
    font-size:18px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

.auth-input{
    width:100%;
    min-width:0;
    background:transparent;
    border:none;
    outline:none;
    box-shadow:none;
    color:#ffffff;
    padding:0;
    font-size:14px;
    line-height:1.4;
}

.auth-input::placeholder{
    color:#64748b;
}

.auth-input:focus{
    outline:none;
    box-shadow:none;
}

.password-toggle{
    position:absolute;
    right:6px;
    top:50%;
    transform:translateY(-50%);
    color:#49a4ff;
    font-size:18px;
    cursor:pointer;
    display:none;
    z-index:5;
    transition:0.25s ease;
    width:20px;
    height:20px;
    align-items:center;
    justify-content:center;
}

.password-visible .password-toggle{
    display:flex;
}

.auth-field.password-field{
    padding-right:40px;
}

.auth-input[type="password"]::-ms-reveal,
.auth-input[type="password"]::-ms-clear{
    display:none;
}

.auth-input[type="password"]::-webkit-credentials-auto-fill-button{
    visibility:hidden;
    display:none !important;
    pointer-events:none;
    position:absolute;
    right:0;
}

.login-btn{
    width:100%;
    margin-top:14px;
    background:linear-gradient(90deg, #6cf2c2, #6aa8ff);
    border:none;
    border-radius:50px;
    padding:12px;
    font-weight:600;
    font-size:15px;
    color:#0b0f1a;
    transition:all 0.35s ease;
    box-shadow:0 4px 12px rgba(108, 242, 194, 0.25);
    position:relative;
    overflow:hidden;
}

.login-btn:hover{
    transform:translateY(-1px);
    box-shadow:
        0 6px 18px rgba(108, 242, 194, 0.35),
        0 0 0 1px rgba(108, 242, 194, 0.25);
}

.login-btn:active{
    transform:translateY(0);
    box-shadow:0 3px 10px rgba(108, 242, 194, 0.25);
}

.login-links{
    margin-top:24px;
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

.login-links a{
    color:#6cf2c2;
    text-decoration:none;
    transition:0.25s ease;
}

.login-links a:hover{
    color:#6aa8ff;
}

.admin-login-link{
    margin-top:18px;
    text-align:center;
}

.admin-login-link a{
    display:inline-flex;
    align-items:center;
    gap:8px;
    color:#8ec5ff;
    text-decoration:none;
    font-size:13px;
    font-weight:600;
    transition:0.25s ease;
}

.admin-login-link a:hover{
    color:#6cf2c2;
}
</style>

{% if not_register %}
<script>
    alert("{{ not_register }}");
</script>
{% endif %}

{% if wrong %}
<script>
    alert("{{ wrong }}");
</script>
{% endif %}

<div class="auth-page">
    <div class="login-card">
        <h4 class="login-title">Login</h4>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'' }}">

            <div class="auth-field">
                <span class="auth-icon"><i class="bi bi-person"></i></span>
                <input type="email" name="email" class="auth-input" placeholder="Email" required>
            </div>

            <div class="auth-field password-field" id="password-group">
                <span class="auth-icon"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" name="password" class="auth-input" placeholder="Password" required oninput="handlePasswordInput()">
                <i class="bi bi-eye password-toggle" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn login-btn w-100">
                Login
            </button>
        </form>

        <div class="login-links">
            <a href="{% url 'forgot_password' %}">Forgot Password?</a>
            <a href="{% url 'register' %}{% if next %}?next={{ next|urlencode }}{% endif %}">Create Account</a>
        </div>

        <div class="admin-login-link">
            <a href="{% url 'admin_login' %}{% if next %}?next={{ next|urlencode }}{% endif %}">
                <i class="bi bi-shield-lock"></i>
                Admin Login
            </a>
        </div>
    </div>
</div>

<script>
    function handlePasswordInput() {
        const group = document.getElementById("password-group");
        const password = document.getElementById("password");

        if (password.value.length > 0) {
            group.classList.add("password-visible");
        } else {
            group.classList.remove("password-visible");
        }
    }

    function togglePassword() {
        const password = document.getElementById("password");
        const icon = document.querySelector(".password-toggle");

        if (password.type === "password") {
            password.type = "text";
            icon.classList.replace("bi-eye", "bi-eye-slash");
        } else {
            password.type = "password";
            icon.classList.replace("bi-eye-slash", "bi-eye");
        }
    }
</script>
{% endblock %}
